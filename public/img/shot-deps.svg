<svg viewBox="0 0 1280 800" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', sans-serif" role="img" aria-label="Maestro IDE dependency graph">
  <defs>
    <marker id="darr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#3d4668"/>
    </marker>
  </defs>
  <rect width="1280" height="800" rx="14" fill="#0d1120"/>
  <rect x="0" y="0" width="1280" height="42" rx="14" fill="#131829"/>
  <rect x="0" y="28" width="1280" height="14" fill="#131829"/>
  <circle cx="24" cy="21" r="6" fill="#e86a8a"/><circle cx="44" cy="21" r="6" fill="#f2b75c"/><circle cx="64" cy="21" r="6" fill="#5fd3a2"/>
  <text x="640" y="26" text-anchor="middle" fill="#98a0b8" font-size="12.5">Dependency graph — pivot: by model · Maestro IDE</text>

  <text x="48" y="94" fill="#f2efe7" font-size="24" font-weight="650">Dependencies</text>
  <text x="48" y="120" fill="#98a0b8" font-size="13">Selected: <tspan fill="#e86a8a">sdxl-turbo · local</tspan> — highlighting everything that breaks if it's removed.</text>

  <g font-family="ui-monospace, Menlo, monospace" font-size="11.5">
    <rect x="440" y="84" width="130" height="30" rx="15" fill="#1a2036"/><text x="505" y="103" text-anchor="middle" fill="#98a0b8">by workflow</text>
    <rect x="580" y="84" width="110" height="30" rx="15" fill="#8b7cf7"/><text x="635" y="103" text-anchor="middle" fill="#0d0a1f" font-weight="700">by model</text>
    <rect x="700" y="84" width="130" height="30" rx="15" fill="#1a2036"/><text x="765" y="103" text-anchor="middle" fill="#98a0b8">by provider</text>
  </g>

  <!-- columns: providers → models → rules/nodes → workflows -->
  <text x="120" y="180" fill="#5c6480" font-size="10.5" letter-spacing="2" font-family="ui-monospace, Menlo, monospace">PROVIDERS</text>
  <text x="440" y="180" fill="#5c6480" font-size="10.5" letter-spacing="2" font-family="ui-monospace, Menlo, monospace">MODELS</text>
  <text x="760" y="180" fill="#5c6480" font-size="10.5" letter-spacing="2" font-family="ui-monospace, Menlo, monospace">ROUTING RULES</text>
  <text x="1060" y="180" fill="#5c6480" font-size="10.5" letter-spacing="2" font-family="ui-monospace, Menlo, monospace">WORKFLOWS</text>

  <!-- provider nodes -->
  <rect x="90" y="220" width="180" height="52" rx="10" fill="#131829" stroke="#232a44"/>
  <text x="180" y="252" text-anchor="middle" fill="#c6cadb" font-size="13">Anthropic</text>
  <rect x="90" y="330" width="180" height="52" rx="10" fill="#131829" stroke="#e86a8a" stroke-width="1.5"/>
  <text x="180" y="362" text-anchor="middle" fill="#c6cadb" font-size="13">ComfyUI · local</text>
  <rect x="90" y="440" width="180" height="52" rx="10" fill="#131829" stroke="#232a44"/>
  <text x="180" y="472" text-anchor="middle" fill="#c6cadb" font-size="13">Ollama · local</text>
  <rect x="90" y="550" width="180" height="52" rx="10" fill="#131829" stroke="#232a44"/>
  <text x="180" y="582" text-anchor="middle" fill="#c6cadb" font-size="13">ElevenLabs</text>

  <!-- model nodes -->
  <rect x="400" y="220" width="200" height="52" rx="10" fill="#131829" stroke="#232a44"/>
  <text x="500" y="252" text-anchor="middle" fill="#c6cadb" font-size="13">claude-sonnet-5</text>
  <rect x="400" y="330" width="200" height="52" rx="10" fill="#1f1420" stroke="#e86a8a" stroke-width="2"/>
  <text x="500" y="362" text-anchor="middle" fill="#e86a8a" font-size="13" font-weight="600">sdxl-turbo · local</text>
  <rect x="400" y="440" width="200" height="52" rx="10" fill="#131829" stroke="#232a44"/>
  <text x="500" y="472" text-anchor="middle" fill="#c6cadb" font-size="13">llava-1.5</text>
  <rect x="400" y="550" width="200" height="52" rx="10" fill="#131829" stroke="#232a44"/>
  <text x="500" y="582" text-anchor="middle" fill="#c6cadb" font-size="13">eleven-tts-v3</text>

  <!-- rule nodes -->
  <rect x="710" y="275" width="230" height="52" rx="10" fill="#131829" stroke="#232a44"/>
  <text x="825" y="300" text-anchor="middle" fill="#c6cadb" font-size="12.5">text-generation → rule 2</text>
  <text x="825" y="318" text-anchor="middle" fill="#5c6480" font-size="10.5" font-family="ui-monospace, Menlo, monospace">primary</text>
  <rect x="710" y="385" width="230" height="52" rx="10" fill="#1f1420" stroke="#e86a8a" stroke-width="2"/>
  <text x="825" y="410" text-anchor="middle" fill="#e86a8a" font-size="12.5">image-generation → rule 3</text>
  <text x="825" y="428" text-anchor="middle" fill="#e86a8a" font-size="10.5" font-family="ui-monospace, Menlo, monospace">primary · 2 fallbacks remain</text>
  <rect x="710" y="495" width="230" height="52" rx="10" fill="#131829" stroke="#232a44"/>
  <text x="825" y="520" text-anchor="middle" fill="#c6cadb" font-size="12.5">tts → rule 5</text>
  <text x="825" y="538" text-anchor="middle" fill="#5c6480" font-size="10.5" font-family="ui-monospace, Menlo, monospace">primary</text>

  <!-- workflow nodes -->
  <rect x="1030" y="330" width="200" height="52" rx="10" fill="#1f1420" stroke="#e86a8a" stroke-width="2"/>
  <text x="1130" y="362" text-anchor="middle" fill="#e86a8a" font-size="13">media-pipeline</text>
  <rect x="1030" y="440" width="200" height="52" rx="10" fill="#1f1420" stroke="#e86a8a" stroke-width="2"/>
  <text x="1130" y="472" text-anchor="middle" fill="#e86a8a" font-size="13">caption-studio</text>
  <rect x="1030" y="220" width="200" height="52" rx="10" fill="#131829" stroke="#232a44"/>
  <text x="1130" y="252" text-anchor="middle" fill="#c6cadb" font-size="13">research-review</text>

  <!-- edges -->
  <path d="M270 246 C 330 246, 340 246, 400 246" stroke="#3d4668" stroke-width="2" fill="none" marker-end="url(#darr)"/>
  <path d="M270 356 C 330 356, 340 356, 400 356" stroke="#e86a8a" stroke-width="2.2" fill="none" marker-end="url(#darr)"/>
  <path d="M270 466 C 330 466, 340 466, 400 466" stroke="#3d4668" stroke-width="2" fill="none" marker-end="url(#darr)"/>
  <path d="M270 576 C 330 576, 340 576, 400 576" stroke="#3d4668" stroke-width="2" fill="none" marker-end="url(#darr)"/>
  <path d="M600 246 C 660 246, 650 301, 710 301" stroke="#3d4668" stroke-width="2" fill="none" marker-end="url(#darr)"/>
  <path d="M600 356 C 660 356, 650 411, 710 411" stroke="#e86a8a" stroke-width="2.2" fill="none" marker-end="url(#darr)"/>
  <path d="M600 466 C 640 466, 640 430, 660 420 C 680 410, 690 411, 710 411" stroke="#3d4668" stroke-width="1.6" fill="none" opacity="0.5"/>
  <path d="M600 576 C 660 576, 650 521, 710 521" stroke="#3d4668" stroke-width="2" fill="none" marker-end="url(#darr)"/>
  <path d="M940 301 C 990 301, 980 246, 1030 246" stroke="#3d4668" stroke-width="2" fill="none" marker-end="url(#darr)"/>
  <path d="M940 411 C 990 411, 980 356, 1030 356" stroke="#e86a8a" stroke-width="2.2" fill="none" marker-end="url(#darr)"/>
  <path d="M940 411 C 990 411, 980 466, 1030 466" stroke="#e86a8a" stroke-width="2.2" fill="none" marker-end="url(#darr)"/>
  <path d="M940 521 C 990 521, 980 480, 1030 476" stroke="#3d4668" stroke-width="2" fill="none" marker-end="url(#darr)"/>

  <!-- impact panel -->
  <rect x="48" y="656" width="1184" height="110" rx="10" fill="#0a0d18" stroke="#232a44"/>
  <text x="70" y="686" fill="#5c6480" font-size="10.5" letter-spacing="2" font-family="ui-monospace, Menlo, monospace">DELETE IMPACT — sdxl-turbo · local</text>
  <text x="70" y="714" fill="#c6cadb" font-size="13">2 workflows and 1 routing rule depend on this model. Rule 3 would fail over to <tspan fill="#4fc3e8">stability-core</tspan>, then <tspan fill="#4fc3e8">gpt-image</tspan>.</text>
  <text x="70" y="740" fill="#c6cadb" font-size="13">6 canvas nodes reference it directly. Maestro lists every reference before any delete.</text>
</svg>
