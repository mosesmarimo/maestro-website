  <text x="70" y="712" fill="#c6cadb" font-size="13">caption-studio · monthly budget $40 — <tspan fill="#5fd3a2" font-weight="600">$12.85 used (32%)</tspan></text>
  <rect x="70" y="724" width="560" height="9" rx="4" fill="#1a2036"/><rect x="70" y="724" width="180" height="9" rx="4" fill="#5fd3a2"/>
  <text x="700" y="658" fill="#c6cadb" font-size="13">⚑ Alert set: error rate &gt; 5% on any provider → notify</text>
  <text x="700" y="690" fill="#c6cadb" font-size="13">⚑ Alert set: single run cost &gt; $2 → pause and ask</text>
